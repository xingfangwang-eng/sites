    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(to bottom, #f8fafc, #ffffff);
            color: #1e293b;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }
        
        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 2rem 0;
        }
        
        .header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }
        
        .header p {
            color: #64748b;
            font-size: 1.125rem;
        }
        
        /* Main Content */
        .main {
            padding: 3rem 0;
        }
        
        /* Section */
        .section {
            margin-bottom: 3rem;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        
        .section-bar {
            width: 4px;
            height: 2rem;
            background: linear-gradient(to bottom, #4f46e5, #7c3aed);
            border-radius: 2px;
        }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
        }
        
        .section-badge {
            padding: 0.25rem 0.75rem;
            background: #eef2ff;
            color: #4f46e5;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 9999px;
        }
        
        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        
        /* Card */
        .card {
            background: white;
            border-radius: 0.75rem;
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            border: 2px solid #f1f5f9;
        }
        
        .card:hover {
            border-color: #c7d2fe;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }
        
        .card-recent {
            border-color: #e0e7ff;
        }
        
        .card-recent:hover {
            border-color: #a5b4fc;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.15);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        
        .card-category {
            padding: 0.25rem 0.5rem;
            background: #f1f5f9;
            color: #475569;
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 0.25rem;
        }
        
        .card-recent .card-category {
            background: #eef2ff;
            color: #4f46e5;
        }
        
        .card-date {
            font-size: 0.75rem;
            color: #94a3b8;
        }
        
        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 0.5rem;
            transition: color 0.3s ease;
        }
        
        .card:hover .card-title {
            color: #4f46e5;
        }
        
        .card-description {
            font-size: 0.875rem;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        
        .card-link {
            display: flex;
            align-items: center;
            font-size: 0.875rem;
            font-weight: 500;
            color: #64748b;
            transition: color 0.3s ease;
        }
        
        .card:hover .card-link {
            color: #4f46e5;
        }
        
        .card-link svg {
            width: 1rem;
            height: 1rem;
            margin-left: 0.25rem;
            transition: transform 0.3s ease;
        }
        
        .card:hover .card-link svg {
            transform: translateX(4px);
        }
        
        /* Stats */
        .stats {
            margin-top: 3rem;
            background: linear-gradient(to right, #4f46e5, #7c3aed);
            border-radius: 1rem;
            padding: 2rem;
            color: white;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 0.875rem;
            color: #c7d2fe;
            margin-top: 0.25rem;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.875rem;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
